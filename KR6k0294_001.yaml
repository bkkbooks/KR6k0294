body:
  text: 釋演音弘一歲次壬申十二月廈門妙釋寺念佛會請余講演録寫此稿於時了識律師臥病不起日夜愁苦見此講稿悲欣交集遂放下身心屏棄醫藥努力念佛併扶病起禮大悲懺吭聲唱誦長跽經時勇猛精進超勝常人見者聞者靡不為之驚喜讚歎謂感動之力有如是劇且大耶余因念此稿雖僅數紙而皆撮録古今嘉言及自所經驗樂簡略者或有所取乃為治定付刊流布焉弘一演音記第一章緒言古詩云我見他人死我心熱如火不是熱他人看看輪到我人生最後一段大事豈可須臾忘耶今為講述次分六章如下所列第二章病重時當病重時應將一切家事及自己身體悉皆放下專意念佛一心希冀往生西方能如是者如壽已盡決定往生如壽未盡雖求往生而病反能速愈因心至專誠故能滅除宿世惡業也倘不如是放下一切專意念佛者如壽已盡決定不能往生因自己專求病愈不求往生無由往生故如壽未盡因其一心希望病愈妄生憂怖不惟不能速愈反更增加病苦耳病未重時亦可服藥但仍須精進念佛勿作服藥愈病之想病既重時可以不服藥也余昔臥病石室有勸延醫服藥者說偈謝云阿彌陀佛無上醫王捨此不求是謂癡狂一句彌陀阿伽陀藥捨此不服是謂大錯因平日既信淨土法門諄諄為人講說今自患病何反捨此而求醫藥可不謂為癡狂大錯耶若病重時痛苦甚劇者切勿驚惶因此病苦乃宿世業障或亦是轉未來三途惡道之苦於今生輕受以速了償也自己所有衣服諸物宜於病重之時即施他人若依地藏菩薩本願經如來讚歎品所言供養經像等則彌善矣若病重時神識猶清應請善知識為之說法盡力安慰舉病者今生所修善業一一詳言而讚歎之令病者心生歡喜無有疑慮自知命終之後承斯善業決定生西第三章臨終時臨終之際切勿詢問遺囑亦勿閒談雜話恐彼牽動愛情貪戀世間有礙往生耳若欲留遺囑者應於康健時書寫付人保藏倘自言欲沐浴更衣者則可順其所欲而試為之若言不欲或噤口不能言者皆不須強為因常人命終之前身體不免痛苦倘強為移動沐浴更衣則痛苦將更加劇世有發願生西之人臨終為眷屬等移動擾亂破壞其正念遂致不能往生者甚多甚多又有臨終可生善道乃為他人誤觸遂起瞋心而牽入惡道者如經所載阿耆達王死墮蛇身豈不可畏臨終時或坐或臥皆隨其意未宜勉強若自覺氣力衰弱者儘可臥牀勿求好看勉力坐起臥時本應面西右脅側臥若因身體痛苦改為仰臥或面東左脅側臥者亦任其自然不可強制大衆助念佛時應請阿彌陀佛接引像供於病人臥室令彼矚視助念之人多少不拘人多者宜輪班念相續不斷或念六字或念四字或快或慢皆須預問病人隨其平日習慣及好樂者念之病人乃能相隨默念今見助念者皆隨己意不問病人既已違其平日習慣及好樂何能相隨默念余願自今以後凡任助念者於此一事切宜留意又尋常助念者皆用引磬小木魚以余經驗言之神經衰弱者病時甚畏引磬及小木魚聲因其聲尖鋭刺激神經反令心神不寧若依余意應免除引磬小木魚僅用音聲助念最為妥當或改為大鐘大磬大木魚其聲宏壯聞者能起肅敬之念實勝於引磬小木魚也但人之所好各有不同此事必須預先向病人詳細問明隨其所好而試行之或有未宜儘可隨時改變萬勿固執第四章命終後一日既已命終最切要者不可急忙移動雖身染便穢亦勿即為洗滌必須經過八小時後乃能浴身更衣常人皆不注意此事而最要緊惟望廣勸同人依此謹慎行之命終前後家人萬不可哭哭有何益能盡力幫助念佛乃於亡者有實益耳若必欲哭者須俟命終八小時後頂門溫暖之說雖有所據然亦不可固執但能平日信願真切臨終正念分明者即可證其往生命終之後念佛已畢即鎖房門深防他人入內誤觸亡者必須經過八小時後乃能浴身更衣前文已言今再諄囑切記切記因八小時內若移動者亡人雖不能言亦覺痛苦八小時後著衣若手足關節硬不能轉動者應以熱水淋洗用布攪熱水圍於臂肘膝彎不久即可活動有如生人殮衣宜用舊物不用新者其新衣應布施他人能令亡者獲福不宜用好棺木亦不宜做大墳此等奢侈事皆不利於亡人第五章薦亡等事七七日內欲延僧衆薦亡以念佛為主若誦經拜懺焰口水陸等事雖有不可思議功德然現今僧衆視為具文敷衍了事不能如法罕有實益印光法師文鈔中屢斥誡之謂其惟屬場面徒作虛套若專念佛則人人能念最為切實能獲莫大之利矣如請僧衆念佛時家族亦應隨念但女衆宜在自室或布帳之內免生譏議凡念佛等一切功德皆宜回向普及法界衆生則其功德乃能廣大而亡者所獲利益亦更因之增長開弔時宜用素齊萬勿用葷致殺害生命大不利於亡人出喪儀文切勿鋪張毋圖生者好看應為亡者惜福也七七以後亦應常行追薦以盡孝思蓮池大師謂年中常須追薦先亡不得謂已得解脫遂不舉行耳第六章勸請發起臨終助念會此事最為切要應於城鄉各地多多設立飭終津梁中有詳細章程宜檢閲之第七章結語殘年將盡不久即是臘月三十日為一年最後若未將錢財預備穩妥則債主紛來如何抵擋吾人臨命終時乃是一生之臘月三十日為人生最後若未將往生資糧預備穩妥必致手忙腳亂呼爺叫娘多生惡業一齊現前如何擺脫臨終雖恃他人助念諸事如法但自己亦須平日修持乃可臨終自在奉勸諸仁者總要及早預備才好
